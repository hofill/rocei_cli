name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  build-macos:
    name: macOS (dylib)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build dylib
        run: |
          cd rocei_pkcs11
          make

      - name: Build CLI
        run: |
          cd rocei_cli
          make

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: rocei_pkcs11-macos
          path: rocei_pkcs11/rocei_pkcs11.dylib

      - name: Upload CLI
        uses: actions/upload-artifact@v4
        with:
          name: rocei-macos
          path: rocei_cli/rocei

  build-linux:
    name: Linux (so)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libpcsclite-dev libssl-dev pkg-config

      - name: Build dylib
        run: |
          cd rocei_pkcs11
          make

      - name: Build CLI
        run: |
          cd rocei_cli
          make

      - name: Upload so
        uses: actions/upload-artifact@v4
        with:
          name: rocei_pkcs11-linux
          path: rocei_pkcs11/rocei_pkcs11.so

      - name: Upload CLI
        uses: actions/upload-artifact@v4
        with:
          name: rocei-linux
          path: rocei_cli/rocei

  build-windows:
    name: Windows (dll)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-pkg-config
            make

      - name: Build dll
        run: |
          cd rocei_pkcs11
          make

      - name: Build CLI
        run: |
          cd rocei_cli
          make

      - name: Upload dll
        uses: actions/upload-artifact@v4
        with:
          name: rocei_pkcs11-windows
          path: rocei_pkcs11/rocei_pkcs11.dll

      - name: Upload CLI
        uses: actions/upload-artifact@v4
        with:
          name: rocei-windows
          path: rocei_cli/rocei.exe

  release:
    name: Create release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/rocei_pkcs11-macos/rocei_pkcs11.dylib
            artifacts/rocei-macos/rocei
            artifacts/rocei_pkcs11-linux/rocei_pkcs11.so
            artifacts/rocei-linux/rocei
            artifacts/rocei_pkcs11-windows/rocei_pkcs11.dll
            artifacts/rocei-windows/rocei.exe
          generate_release_notes: true
